<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Website</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>

<body>
  <div class="navbar">
    <div class="logo">
      <img src="logo.png" alt="">
    </div>
    <ul class="navlist">
      <li><a href="#">Home</a> </li>
      <li><a href="#">Menu</a> </li>
      <li><a href="#">Services</a> </li>
      <li><a href="#">Product</a> </li>
      <li><a href="#">Contact</a> </li>
      <li class="slider"></li>
    </ul>
  </div>
  <section class="hero">
    <div class="hero_split left">
      <div class="content">
        <h1>Coffee Time</h1>
        <p>Freshly roasted, perfectly brewed, and served with passion. Discover the taste of coffee that awakens your senses and fuels your day.</p>
        <button>Catalog</button>
      </div>
    </div>
    <div class="middle">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>
    <div class="hero_split right">
      <img src="coffee split.png" alt="">
    </div>
  </section>
  <footer>
    <p>© 2026 Coffee Time | All Rights Reserved.</p>
</footer>
</body>
</html>
